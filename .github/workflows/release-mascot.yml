name: Release Mascot

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  mascot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Fetch full history so we can push back cleanly
          fetch-depth: 0

      # ── 1. Generate the mascot image ──────────────────────────────────────
      - name: Generate Release Mascot image
        uses: OwainWilliams/OC.ReleaseMascot@main
        with:
          Tag: ${{ github.event.release.tag_name }}

      # ── 2. Generate a random mascot name ─────────────────────────────────
      - name: Install dotnet-script
        run: dotnet tool install -g dotnet-script

      - name: Generate mascot name
        id: mascot_name
        run: |
          NAME=$(dotnet script scripts/GenerateMascotName.csx -- "${{ github.event.release.tag_name }}")
          echo "name=$NAME" >> $GITHUB_OUTPUT

      # ── 3. Update the README hall of fame ────────────────────────────────
      - name: Update README with new mascot
        shell: pwsh
        run: |
          scripts/UpdateReadme.ps1 \
            -Tag "${{ github.event.release.tag_name }}" \
            -MascotName "${{ steps.mascot_name.outputs.name }}" \
            -RepoRoot "${{ github.workspace }}"

      # ── 4. Commit everything back ─────────────────────────────────────────
      - name: Commit mascot and README update
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add mascots/ README.md
          git commit -m "chore: add mascot for ${{ github.event.release.tag_name }} — ${{ steps.mascot_name.outputs.name }}"
          git push
